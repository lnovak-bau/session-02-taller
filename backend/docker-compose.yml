version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Override with a strong random value in production:
      # openssl rand -hex 32
      - SECRET_KEY=supersecretkey_change_in_production
    restart: unless-stopped
